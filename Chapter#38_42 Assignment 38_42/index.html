<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JS Assignment 38-44</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>Assignment 38-44 JavaScript</h2>

<!-- POWER -->
<div class="section">
<h3>1. Power Function</h3>
<input id="a" placeholder="Base">
<input id="b" placeholder="Power">
<button onclick="power()">Calculate</button>
<div class="result" id="powerRes"></div>
</div>

<!-- LEAP YEAR -->
<div class="section">
<h3>2. Leap Year</h3>
<input id="year" placeholder="Enter Year">
<button onclick="leap()">Check</button>
<div class="result" id="leapRes"></div>
</div>

<!-- TRIANGLE -->
<div class="section">
<h3>3. Triangle Area</h3>
<input id="t1" placeholder="a">
<input id="t2" placeholder="b">
<input id="t3" placeholder="c">
<button onclick="triangle()">Area</button>
<div class="result" id="triRes"></div>
</div>

<!-- MARKS -->
<div class="section">
<h3>4. Average & Percentage</h3>
<input id="m1" placeholder="Marks 1">
<input id="m2" placeholder="Marks 2">
<input id="m3" placeholder="Marks 3">
<button onclick="mainFunction()">Calculate</button>
<div class="result" id="markRes"></div>
</div>

<!-- INDEXOF -->
<div class="section">
<h3>5. Custom indexOf</h3>
<input id="text" placeholder="Text">
<input id="char" placeholder="Character">
<button onclick="customIndex()">Find</button>
<div class="result" id="indexRes"></div>
</div>

<!-- DELETE VOWELS -->
<div class="section">
<h3>6. Delete Vowels</h3>
<input id="sentence" placeholder="Sentence">
<button onclick="removeVowels()">Remove</button>
<div class="result" id="vowelRes"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
